
name: etl pipeline

on:

    push:

        branches:

            - main

jobs:

    job_1:

        runs-on: ubuntu-latest

        steps:

            - name: Checkout Code

              uses: actions/checkout@v2

            - name: Run extract_data.py

              run: python extract_data.py

    job_2:

        runs-on: ubuntu-latest

        needs: job_1

        steps:

            - name: Checout Code

              uses: actions/checkout@v2

            - name: Run transform_data.py

              run: python transform_data.py

    job_3:

        runs-on: ubuntu-latest

        needs: job_1

        steps:

            - name: Checout Code

              uses: actions/checkout@v2

            - name: Run load_data.py

              run: python load_data.py

    job_4:

        runs-on: job_2

        steps:

            - name: Checkout Code

              uses: actions/checkout@v2

            - name: Run extract_data.py

              run: python extract_data.py

    job_5:

        runs-on: ubuntu-latest

        needs: job_3

        steps:

            - name: Checout Code

              uses: actions/checkout@v2

            - name: Run transform_data.py

              run: python transform_data.py

    job_6:

        runs-on: ubuntu-latest

        needs: [job_4,job_5]

        steps:

            - name: Checout Code

              uses: actions/checkout@v2

            - name: Run load_data.py

              run: python load_data.py




